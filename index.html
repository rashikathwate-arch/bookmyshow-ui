<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow UI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>It All Starts Here!</h1>
    <p class="location">Nagpur</p>
</header>

<div class="categories">
    <div class="cat">🎬 Movies</div>
    <div class="cat">🎤 Comedy</div>
    <div class="cat">🎵 Music</div>
    <div class="cat">🏏 Sports</div>
    <div class="cat">🎭 Plays</div>
</div>

<section class="banner">
    <img src="banner.jpg" alt="Banner">
</section>

<section class="recommended">
    <h2>Recommended Movies</h2>

    <div class="movies">

        <div class="movie">
            <img src="movie1.jpg">
            <h3>Dhurandhar</h3>
            <p>623K Likes</p>
        </div>

        <div class="movie">
            <img src="movie2.jpg">
            <h3>The Kerala Story 2</h3>
            <p>9.2 Rating</p>
        </div>

        <div class="movie">
            <img src="movie3.jpg">
            <h3>Action Movie</h3>
            <p>159K Likes</p>
        </div>

    </div>

</section>

<footer>
    <div>🏠 Home</div>
    <div>🎬 Movies</div>
    <div>🎟 Events</div>
    <div>👤 Profile</div>
</footer>

</body>
</html>
